vp_transform_publisher:
  ros__parameters:
    visionpro_ip: "192.168.10.253"
    pinch_threshold: 0.02   # just for markers for rviz
    rate_hz: 50.0

vp_streamer:
  ros__parameters:
    visionpro_ip: "192.168.10.253"
    port: 50051                           # gRPC port for USDZ transfer
    joint_state_topic: "/joint_states_mycobot"
    attach_to: [0.0, 0.3, 0.65, -55.0]    # y-axis goes from viewer straight to the distance
    update_simulation_hz: 120.0
    force_reload: true
    ###### Camera parameters 
    camera_device: "/dev/video0" # laptop: "/dev/video0"
    camera_resolution: "640x480" # "640x480" #"160x120" #"640x480"
    format: "v4l2"
    camera_fps: 30
    camera_mode: "both" # robot, realsense, both
    realsense_image_topic: "/camera/camera/color/image_raw"
    pointcloud_topic: "/points_downsampled"
    controller_mode_enabled_on_startup: false
    controller_cmd_vel_topic: "/cmd_vel"
    controller_head_delta_topic: "/teleop/head_delta_rpy"
    controller_publish_hz: 30.0
    controller_pinch_start_threshold: 0.02
    controller_pinch_release_threshold: 0.028
    controller_max_delta_m: 0.20
    controller_deadzone: 0.05
    controller_linear_scale: 1.0
    controller_angular_scale: 1.8
    controller_max_linear_x: 1.0
    controller_max_angular_z: 1.8
    # Teleop target to publish when MuJoCo stream is reset. Values are in
    # the `mycobot_base` frame by default and will be published as
    # `teleoperation/TeleopTarget` on `/teleop/ee_target`.
    ee_target_on_reset_position: [0.109, -0.063, 0.314]
    ee_target_on_reset_orientation_xyzw: [-0.002, 0.500, -0.004, 0.866]
    ee_target_on_reset_gripper: 100
    # To adjust point size in vison pro app: chnage "spriteSize" in .../Tracking Streamer/🥽AppModel.swift

rgb_pointcloud_downsampler:
  ros__parameters:
    input_topic: "/camera/camera/depth/color/points"
    output_topic: "/points_downsampled"
    target_frame: "camera_lens"
    publish_rate_hz: 5.0 # (max 30 Hz or 15 Hz depending on settings in launch file)
    downsample_factor: 60

camera_streamer:
  ros__parameters:
    visionpro_ip: "192.168.50.153"
    resolution:  "848x480"  # "1280x720"
    camera_input: "/dev/video0" # Robot camera
    # camera_input: "/dev/video0" # Laptop camera
    format: "v4l2" # on linux "v4l2", on windows "dshow", on mac "avfoundation"
    fps: 25

teleop_control_cpp:
  ros__parameters:
    update_period: 0.001    # seconds ############## How fast to publish target topic and tf which inv_kin. node subscribes to
    update_period_vis: 0.001    # seconds

    smoothing_factor: 2.0  # Run sampling this many times faster than update_period
    smoothing_window: 5   # Number of recent samples to average

    translation_scale: 0.95  # Scale translation of the commanded EE pose in mycobot_base
    rotation_scale: 1.0     # Scale rotation of the commanded EE pose

    # Gesture thresholds
    pinch_threshold: 0.02
    right_pinch_min: 0.015
    right_pinch_max: 0.150

    scene_z_rotation_attachedto: -140.0   # degrees, should be -90 - same as in "attach_to" in vp_streamer

joint_state_to_mycobot:
  ros__parameters:
    port: "/dev/ttyACM0"
    baud: 115200
    gripper_speed: 100
    speed: 70               # default movement speed if adaptive speed is false
    adaptive_speed: true
    adaptive_speed_low_speed: 70
    adaptive_speed_high_speed: 95

    initial_angles_deg: [0, 30, -90, 0, 0, 45]
    initial_move_speed: 35

inverse_kinematics_node:
  ros__parameters:
    # Topics and frames
    target_topic: "/teleop/ee_target"
    joint_target_topic: "/joint_states_mycobot"

    # IK tuning parameters
    position_tolerance: 0.01      # meters
    orientation_tolerance: 0.02   # radians
    max_iterations: 100
    damping: 0.015
    step_tolerance: 2.0e-6        # rad magnitude of joint update
    gripper_percent: 100          # default gripper position in percent

    joint_states_ros2_update_rate: 60.0 # Hz
    mycobot_target_pose_update_rate: 0.02 ######### Change the frequeny to send topic to my_cobot

    joint_lower_limits_deg: [-140.0, -140.0, -140.0, -140.0, -140.0, -170.0]
    joint_upper_limits_deg: [ 140.0,  140.0,  140.0,  140.0,  140.0,  170.0]

    initial_joint_positions_deg: [0.0, 30.0, -90.0, 0.0, 0.0, 45.0]

    ee_target_on_reset_position: [0.109, -0.063, 0.314]
    ee_target_on_reset_orientation_xyzw: [-0.002, 0.500, -0.004, 0.866]

sam_client:
  ros__parameters:
    watch_dir: "/home/ferdinand/Dropbox/sam_data"
    server_url: "http://localhost:18000"
    result_files: ["object_visual.obj", "object_collision.obj", "material_0.mtl", "material.png"]

    add_to_mujoco: true
    mujoco_scene_name: "scene_mycobot"
